<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>დღიური</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="diary-wrap">
        <a class="back-link" href="../index.html">← მთავარი</a>

        <div class="page-header">
            <span class="geo-label">Diary</span>
            <h1>📔 დღიური</h1>
        </div>

        <div class="breadcrumb" id="breadcrumb"></div>

        <section id="years-section">
            <div class="option-grid" id="years-list"></div>
        </section>

        <section id="months-section" class="hidden">
            <div class="option-grid" id="months-list"></div>
        </section>

        <section id="days-section" class="hidden">
            <div class="option-grid" id="days-list"></div>
        </section>

        <section id="entry-section" class="hidden">
            <div class="entry-card">
                <span class="entry-date" id="entry-date"></span>
                <p id="entry-content"></p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
